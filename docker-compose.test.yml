services:

  test_db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: "test_password123!"
      POSTGRES_DB: rag_api_test_db
    tmpfs:
      - /var/lib/postgresql/data:rw
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U test_user -d rag_api_test_db" ]
      interval: 2s
      timeout: 2s
      retries: 5

  test-runner:
    build:
      context: .
      target: builder
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://test_user:test_password123!@test_db:5432/rag_api_test_db
      - TEST_DATABASE_URL=postgresql://test_user:test_password123!@test_db:5432/rag_api_test_db
      - DB_HOST=test_db
      - DB_PORT=5432
      - POSTGRES_HOST=test_db
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password123!
      - POSTGRES_DB=rag_api_test_db
    depends_on:
      test_db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && pytest -v --tb=short"